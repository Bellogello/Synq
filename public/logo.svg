<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Rounded square border -->
  <rect x="6" y="6" width="88" height="88" rx="14" ry="14"
        fill="none" stroke="#14B8A6" stroke-width="7"/>

  <!-- Bar 1 (left) - shortest, starts lowest -->
  <rect x="18" y="57" width="14" height="25" rx="2" fill="#14B8A6"/>

  <!-- Bar 2 (middle) - medium, but has a gap = looks like i -->
  <!-- Top part -->
  <rect x="43" y="45" width="14" height="14" rx="2" fill="#14B8A6"/>
  <!-- Bottom part -->
  <rect x="43" y="68" width="14" height="14" rx="2" fill="#14B8A6"/>

  <!-- Bar 3 (right) - tallest, starts highest -->
  <rect x="68" y="28" width="14" height="54" rx="2" fill="#14B8A6"/>
</svg>
